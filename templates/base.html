<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Barrio Marketplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .bottom-nav {
            display: none; position: fixed; bottom: 0; width: 100%; height: 65px;
            background: white; border-top: 1px solid #dee2e6; z-index: 1000;
        }
        .nav-item-mobile {
            flex: 1; text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #6c757d; text-decoration: none; font-size: 11px;
        }
        .nav-item-mobile.active { color: #007bff; font-weight: bold; }
        
        @media (max-width: 768px) {
            .bottom-nav { display: flex; }
            body { padding-bottom: 70px; }
            .navbar-desktop { display: none !important; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary d-none d-md-block navbar-desktop">
        <div class="container">
            <a class="navbar-brand" href="/">🏠 Mi Barrio</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Mapa</a>
                {% if session.user_id %}
                    <a class="nav-link" href="/dashboard_mype">Mi Negocio</a>
                    <a class="nav-link text-warning" href="/logout">Salir</a>
                {% else %}
                    <a class="nav-link" href="/login">Ingresar</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container {% if request.path == '/' %}main-container-map{% else %}mt-4{% endif %}">
        {% block content %}{% endblock %}
    </div>

    <nav class="bottom-nav d-flex d-md-none">
        <a href="/" class="nav-item-mobile {% if request.path == '/' %}active{% endif %}">
            <span class="icon">📍</span><span>Mapa</span>
        </a>
        
        {% if session.user_rol == 'mype' %}
        <a href="/dashboard_mype" class="nav-item-mobile {% if request.path == '/dashboard_mype' %}active{% endif %}">
            <span class="icon">📦</span><span>Ventas</span>
        </a>
        {% endif %}

        <a href="/mensajes" class="nav-item-mobile {% if request.path == '/mensajes' %}active{% endif %}">
            <span class="icon">💬</span>
            <span>Chats</span>
        </a>

        {% if session.user_id %}
        <a href="/perfil" class="nav-item-mobile {% if request.path == '/perfil' %}active{% endif %}">
            <span class="icon">👤</span>
            <span>Perfil</span>
        </a>
        {% else %}
        <a href="/login" class="nav-item-mobile">
            <span class="icon">🔑</span>
            <span>Entrar</span>
        </a>
        {% endif %}
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
