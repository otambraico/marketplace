{% extends "base.html" %}

{% block title %}Mapa Vecinal - Barrio Market{% endblock %}

{% block head %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Eliminamos los márgenes del container solo para el mapa */
        .main-container-map {
            padding: 0 !important;
            margin: 0 !important;
            max-width: 100% !important;
        }
        #map {
            height: calc(100vh - 140px); /* Ajuste considerando el header y navbar */
            width: 100%;
            display: block;
        }
        @media (max-width: 768px) {
            #map { height: calc(100vh - 200px); }
        }
        .info-header { padding: 15px; background: white; text-align: center; border-bottom: 1px solid #ddd; }
    </style>
{% endblock %}

{% block content %}
    <div class="main-container-map">
        <div class="info-header shadow-sm">
            <h1 class="h4 mb-1">📍 Ofertas en tu Barrio</h1>
            <p class="small text-muted mb-0">Descubre negocios cerca de ti.</p>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
   
    <script>
        var map; // Definimos la variable globalmente

        function irAlChat(id) {
            window.location.href = "/chat/" + id;
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Inicialización del mapa
            map = L.map('map').setView([-12.046374, -77.042793], 13); // Lima por defecto

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Geolocalización
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var userLat = position.coords.latitude;
                    var userLng = position.coords.longitude;
                    map.setView([userLat, userLng], 15);
                    L.marker([userLat, userLng]).addTo(map).bindPopup("<b>Estás aquí</b>").openPopup();
                    cargarMypesCercanas();
                });
            }

            function cargarMypesCercanas() {
                fetch('/api/mypes')
                    .then(response => response.json())
                    .then(mypes => {
                        mypes.forEach(mype => {
                            if(mype.latitud && mype.longitud) {
                                var marker = L.marker([mype.latitud, mype.longitud]).addTo(map);
                                let listaProd = mype.productos && mype.productos.length > 0 
                                    ? mype.productos.map(p => `<li>${p.nombre} - <b>S/${p.precio}</b></li>`).join('')
                                    : "<li>Sin ofertas</li>";
                                
                                marker.bindPopup(`
                                    <div style="min-width:150px;">
                                        <h3 style="margin:0; font-size:14px; color:#007bff;">${mype.nombre_comercial}</h3>
                                        <ul style="font-size:12px; padding-left:15px;">${listaProd}</ul>
                                        <button onclick="irAlChat(${mype.mype_id})" class="btn btn-primary btn-sm w-100">💬 Chat</button>
                                    </div>
                                `);
                            }
                        });
                    });
            }

            // EL FIX: Forzar el tamaño correcto después de un breve delay
            setTimeout(function() {
                map.invalidateSize();
            }, 400);
        });

        window.addEventListener('resize', function() {
            if(map) map.invalidateSize();
        });
    </script>
{% endblock %}
