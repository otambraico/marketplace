{% extends "base.html" %}

{% block title %}Mapa Vecinal - Barrio Market{% endblock %}

{% block head %}
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Forzamos que el mapa tenga visibilidad y altura */
        #map {
                height: calc(100vh - 56px); /* 56px es la altura estándar del navbar de Bootstrap */
                width: 100%;
                z-index: 1;
            }

            /* En móviles, ajustamos para la barra inferior */
            @media (max-width: 768px) {
                #map {
                    height: calc(100vh - 65px); 
                }
            }
        .info-header { padding: 20px; background: white; text-align: center; border-bottom: 1px solid #ddd; }
    </style>
    <script>
        // Esto fuerza a Leaflet a recalcular el tamaño del mapa y rellenar los cuadros
        setTimeout(function(){ 
            map.invalidateSize(); 
        }, 500);
    </script>
{% endblock %}

{% block content %}
    <div class="info-header shadow-sm">
        <h1 class="h3 mb-1">📍 Ofertas en tu Barrio</h1>
        <p class="text-muted mb-0">Descubre negocios cerca de ti y chatea directamente.</p>
    </div>

    <div id="map" class="shadow-sm"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Forzar el re-calculo del tamaño del mapa tras la carga inicial
        window.addEventListener('load', function() {
            setTimeout(function() {
                map.invalidateSize();
            }, 500);
        });

        // También al cambiar el tamaño de la ventana (rotación de celular)
        window.addEventListener('resize', function() {
            map.invalidateSize();
        });
    </script>
    <script>
        // 1. Definimos irAlChat de forma global para que el botón del popup la vea
        function irAlChat(id) {
            window.location.href = "/chat/" + id;
        }
        document.addEventListener('DOMContentLoaded', function() {
        // Mantenemos tu lógica de Leaflet exacta
        var map = L.map('map').setView([0, 0], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var userLat = position.coords.latitude;
                var userLng = position.coords.longitude;
                map.setView([userLat, userLng], 15);

                L.marker([userLat, userLng]).addTo(map)
                    .bindPopup("<b>Estás aquí</b>").openPopup();
                
                cargarMypesCercanas();
            });
        }

        function cargarMypesCercanas() {
            fetch('/api/mypes') // Asegúrate de que la ruta coincida con tu app.py
                .then(response => response.json())
                .then(mypes => {
                    mypes.forEach(mype => {
                        if(mype.latitud && mype.longitud) {
                            var marker = L.marker([mype.latitud, mype.longitud]).addTo(map);
                            
                            let listaProductos = "";
                            if (mype.productos && mype.productos.length > 0) {
                                listaProductos = "<ul style='padding-left:15px; margin:10px 0;'>";
                                mype.productos.forEach(prod => {
                                    listaProductos += `<li>${prod.nombre} - <strong>S/${prod.precio}</strong></li>`;
                                });
                                listaProductos += "</ul>";
                            } else {
                                listaProductos = "<p><i>Sin ofertas actuales</i></p>";
                            }

                            var popupContent = `
                                <div style="min-width:150px;">
                                    <h3 style="margin:0; color:#007bff; font-size:16px;">${mype.nombre_comercial}</h3>
                                    <small class="text-muted">${mype.categoria}</small>
                                    ${listaProductos}
                                    <button onclick="irAlChat(${mype.mype_id})" 
                                        class="btn btn-success btn-sm w-100 mt-2">
                                        💬 Chatear
                                    </button>
                                </div>
                            `;
                            marker.bindPopup(popupContent);
                        }
                    });
                })
                .catch(err => console.error("Error cargando MYPES:", err));
        }
       
        });
    </script>
{% endblock %}
