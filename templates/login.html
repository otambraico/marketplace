<!DOCTYPE html>
<html lang="es">
<head>
    <title>Entrar - Barrio Market</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f7f6; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { display: block; width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .flash { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container" style="max-width: 400px; margin: 50px auto; padding: 20px;">
        <div class="card shadow-sm p-4">
            <h2 class="text-center mb-4">🏠 Mi Barrio</h2>
            <form action="/login" method="POST">
                <div class="mb-3">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="ejemplo@correo.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Ingresar</button>
            </form>
            <p class="text-center mt-4">
                ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
            </p>
        </div>
    </div>
</body>
</html>
