{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm p-4">
                <div class="d-flex align-items-center mb-4">
                    <a href="/dashboard_mype" class="text-decoration-none text-muted me-3 fs-5"><i class="bi bi-arrow-left"></i></a>
                    <h4 class="fw-bold mb-0">Editar Producto</h4>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">Precio (S/)</label>
                            <input type="number" step="0.01" name="precio" class="form-control" value="{{ producto.precio }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted small fw-bold">URL de la Foto</label>
                            <input type="url" name="foto_url" class="form-control" value="{{ producto.foto_url or '' }}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3">{{ producto.descripcion or '' }}</textarea>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Actualizar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
