{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper d-flex flex-column" style="height: calc(100vh - 160px);">
    <div class="p-3 bg-white border-bottom d-flex align-items-center">
        <a href="/" class="text-decoration-none me-3">⬅️</a>
        <div>
            <h6 class="mb-0 fw-bold">{{ contacto.nombre }}</h6>
            <small class="text-success">● En línea</small>
        </div>
    </div>

    <div id="chat-box" class="flex-grow-1 p-3 overflow-auto" style="background-color: #f8f9fa;">
        {% for m in historial %}
            <div class="d-flex {% if m.emisor_id == session.user_id %}justify-content-end{% else %}justify-content-start{% endif %} mb-3">
                <div class="p-2 px-3 shadow-sm" 
                     style="max-width: 80%; border-radius: 15px; 
                            background-color: {% if m.emisor_id == session.user_id %}#dcf8c6{% else %}#ffffff{% endif %};">
                    <p class="mb-0">{{ m.contenido }}</p>
                    <small class="text-muted d-block text-end" style="font-size: 10px;">
                        {{ m.fecha.strftime('%H:%M') if m.fecha else '' }}
                    </small>
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="p-3 bg-white border-top">
        <form id="chat-form" class="d-flex gap-2">
            <input type="text" id="mensaje-input" class="form-control" placeholder="Escribe un mensaje..." autocomplete="off" required>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // Usamos |default y |tojson para asegurar que siempre haya un valor válido
    const USER_ID = parseInt("{{ session.user_id | default(0) }}");
    const CONTACTO_ID = parseInt("{{ contacto.id | default(0) }}");

    // Validación inmediata: Si es NaN, mostramos error en consola para no intentar enviar
    if (isNaN(CONTACTO_ID) || CONTACTO_ID === 0) {
        console.error("❌ Error Crítico: CONTACTO_ID es inválido. Revisa la variable 'contacto' en el backend.");
    }

    const socket = io({
        transports: ['websocket', 'polling'],
        reconnection: true,
        timeout: 30000
    });

    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const inputMsg = document.getElementById('mensaje-input');

    // 2. SRP: Única responsabilidad de Scroll
    function scrollToBottom() {
        if (chatBox) {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // 3. Handshake Unificado (Eliminamos el duplicado)
    socket.on('connect', () => {
        console.log("🟢 Conexión Exitosa. SID:", socket.id);
        // Usamos USER_ID definido previamente en el script
        socket.emit('join', { user_id: USER_ID });
    });

    // 4. Manejo de Errores con Feedback
    socket.on('connect_error', (error) => {
        console.error("❌ Fallo en conexión:", error.message);
        // Si hay timeout, el socket intentará reconectar automáticamente por la config de arriba
    });

    socket.on('disconnect', (reason) => {
        console.warn("🟡 Socket desconectado por:", reason);
    });

    // Envío de mensajes
    chatForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const texto = inputMsg.value.trim();
    
    // Verificamos que el socket esté conectado y el ID sea válido
    if (texto && socket.connected && !isNaN(CONTACTO_ID)) {
        console.log("✈️ Enviando mensaje real a ID:", CONTACTO_ID);
        socket.emit('enviar_mensaje', {
            receptor_id: CONTACTO_ID,
            mensaje: texto
        });
        inputMsg.value = '';
    } else {
        console.warn("⚠️ No se pudo enviar: Socket desconectado o ID inválido");
    }
    });

    // Recepción de mensajes
    socket.on('nuevo_mensaje', (data) => {
        console.log("📩 Nuevo mensaje recibido:", data);
        
        // Validar si el mensaje pertenece a este chat abierto
        if (data.emisor_id == CONTACTO_ID || data.emisor_id == USER_ID) {
            renderizarBurbuja(data);
            scrollToBottom();
            
            // NUEVO: Si el mensaje que acaba de llegar es de la otra persona, 
            // le digo al servidor "¡Ya lo vi!" para que borre el globito rojo.
            if (data.emisor_id == CONTACTO_ID) {
                socket.emit('marcar_leido', { emisor_id: CONTACTO_ID });
            }
        }
    });

    // SRP: Renderizado de UI
    function renderizarBurbuja(data) {
        const esMio = data.emisor_id == USER_ID;
        const div = document.createElement('div');
        div.className = `d-flex ${esMio ? 'justify-content-end' : 'justify-content-start'} mb-3`;
        
        div.innerHTML = `
            <div class="p-2 px-3 shadow-sm" style="max-width: 80%; border-radius: 15px; 
                 background-color: ${esMio ? '#dcf8c6' : '#ffffff'};
                 border-bottom-${esMio ? 'right' : 'left'}-radius: 2px;">
                <p class="mb-0">${data.mensaje}</p>
                <small class="text-muted d-block text-end" style="font-size: 10px;">${data.fecha || 'Ahora'}</small>
            </div>`;
        
        chatBox.appendChild(div);
    }

    // Inicio
    window.onload = scrollToBottom;
</script>
{% endblock %}
