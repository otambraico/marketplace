{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white d-flex justify-content-between">
                    <span>Chat con: <strong>{{ receptor.nombre }}</strong></span>
                    <a href="/" class="btn-close btn-close-white"></a>
                </div>
                
                <div id="chat-box" class="card-body overflow-auto" style="height: 400px; background-color: #f8f9fa;">
                    {% for msg in historial %}
                        <div class="mb-2 d-flex {% if msg.emisor_id == session['user_id'] %}justify-content-end{% endif %}">
                            <div class="p-2 rounded-3 shadow-sm" 
                                 style="max-width: 80%; {% if msg.emisor_id == session['user_id'] %}background-color: #dcf8c6;{% else %}background-color: #fff;{% endif %}">
                                <small class="d-block fw-bold" style="font-size: 0.7rem;">{{ msg.emisor_nombre }}</small>
                                {{ msg.contenido }}
                            </div>
                        </div>
                    {% endfor %}
                </div>

                <div class="card-footer bg-white border-top">
                    <div class="input-group">
                        <input type="text" id="input_msj" class="form-control" placeholder="Escribe un mensaje...">
                        <button class="btn btn-primary" id="btn_enviar">
                            <i class="bi bi-send"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socketio.js"></script>
<script>
    const socket = io();
    const receptor_id = "{{ receptor_id }}";
    const emisor_id = "{{ session['user_id'] }}";
    const emisor_nombre = "{{ session['user_nombre'] }}";
    const chatBox = document.getElementById('chat-box');

    // --- NUEVO: Unirse a la sala privada al conectar ---
    socket.on('connect', () => {
        socket.emit('join', { user_id: emisor_id });
    });

    // Función para enviar mensaje
    document.getElementById('btn_enviar').onclick = () => {
        const input = document.getElementById('input_msj');
        if (input.value.trim() !== "") {
            socket.emit('enviar_mensaje', {
                'receptor_id': receptor_id,
                'mensaje': input.value
            });
            input.value = "";
        }
    };

    // Escuchar nuevos mensajes
    socket.on('nuevo_mensaje', (data) => {
        const div = document.createElement('div');
        // Si el ID del que envía es el mío, se alinea a la derecha
        const esMio = data.de_id == emisor_id;
        
        div.className = `mb-2 d-flex ${esMio ? 'justify-content-end' : 'justify-content-start'}`;
        div.innerHTML = `
            <div class="p-2 rounded-3 shadow-sm" style="max-width: 80%; background-color: ${esMio ? '#dcf8c6' : '#fff'};">
                <small class="d-block fw-bold" style="font-size: 0.7rem;">${data.de}</small>
                ${data.msg}
            </div>
        `;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // Enviar con la tecla Enter
    document.getElementById('input_msj').addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            document.getElementById('btn_enviar').click();
        }
    });
</script>
{% endblock %}
