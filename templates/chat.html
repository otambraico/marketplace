{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper d-flex flex-column" style="height: calc(100vh - 160px);">
    <div class="p-3 bg-white border-bottom d-flex align-items-center">
        <a href="/" class="text-decoration-none me-3">⬅️</a>
        <div>
            <h6 class="mb-0 fw-bold">{{ contacto.nombre }}</h6>
            <small class="text-success">● En línea</small>
        </div>
    </div>

    <div id="chat-box" class="flex-grow-1 p-3 overflow-auto" style="background-color: #f8f9fa;">
        {% for m in historial %}
            <div class="d-flex {% if m.emisor_id == session.user_id %}justify-content-end{% else %}justify-content-start{% endif %} mb-3">
                <div class="p-2 px-3 shadow-sm" 
                     style="max-width: 80%; border-radius: 15px; 
                            background-color: {% if m.emisor_id == session.user_id %}#dcf8c6{% else %}#ffffff{% endif %};">
                    <p class="mb-0">{{ m.contenido }}</p>
                    <small class="text-muted d-block text-end" style="font-size: 10px;">
                        {{ m.fecha.strftime('%H:%M') if m.fecha else '' }}
                    </small>
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="p-3 bg-white border-top">
        <form id="chat-form" class="d-flex gap-2">
            <input type="text" id="mensaje-input" class="form-control" placeholder="Escribe un mensaje..." autocomplete="off" required>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // 1. Extraemos variables de Jinja de forma segura (Esto evita errores en VS Code)
    const USER_ID = parseInt("{{ session.user_id }}");
    const CONTACTO_ID = parseInt("{{ contacto.id }}");

    // 2. Inicialización del Socket con reconexión activa
    const socket = io({
    transports: ['websocket'], // Forzamos solo websocket para evitar el rebote con polling
    upgrade: false,             // Evitamos intentos de upgrade innecesarios
    timeout: 20000,            // 20 segundos de gracia para conectar
    reconnection: true,
    reconnectionAttempts: 10,
    reconnectionDelay: 1000
    });

    const chatBox = document.getElementById('chat-box');
    const chatForm = document.getElementById('chat-form');
    const inputMsg = document.getElementById('mensaje-input');

    // SRP: Función de Scroll
    function scrollToBottom() {
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Handshake: Unirse a la sala
    socket.on('connect', () => {
        console.log("✅ Conectado. ID de Socket:", socket.id);
        socket.emit('join', { user_id: USER_ID });
    });

    socket.on('connect_error', (error) => {
        console.error("❌ Error de conexión Socket:", error);
    });

    socket.on('connect', () => {
        console.log("✅ Conexión establecida. SID:", socket.id);
        socket.emit('join', { user_id: USER_ID });
    });

    // Envío de mensajes
    chatForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const texto = inputMsg.value.trim();
        
        if (texto) {
            console.log("✈️ Enviando a:", CONTACTO_ID);
            socket.emit('enviar_mensaje', {
                receptor_id: CONTACTO_ID,
                mensaje: texto
            });
            inputMsg.value = '';
        }
    });

    // Recepción de mensajes
    socket.on('nuevo_mensaje', (data) => {
        console.log("📩 Nuevo mensaje recibido:", data);
        // Validar si el mensaje pertenece a este chat abierto
        if (data.emisor_id == CONTACTO_ID || data.emisor_id == USER_ID) {
            renderizarBurbuja(data);
            scrollToBottom();
        }
    });

    // SRP: Renderizado de UI
    function renderizarBurbuja(data) {
        const esMio = data.emisor_id == USER_ID;
        const div = document.createElement('div');
        div.className = `d-flex ${esMio ? 'justify-content-end' : 'justify-content-start'} mb-3`;
        
        div.innerHTML = `
            <div class="p-2 px-3 shadow-sm" style="max-width: 80%; border-radius: 15px; 
                 background-color: ${esMio ? '#dcf8c6' : '#ffffff'};
                 border-bottom-${esMio ? 'right' : 'left'}-radius: 2px;">
                <p class="mb-0">${data.mensaje}</p>
                <small class="text-muted d-block text-end" style="font-size: 10px;">${data.fecha || 'Ahora'}</small>
            </div>`;
        
        chatBox.appendChild(div);
    }

    // Inicio
    window.onload = scrollToBottom;
</script>
{% endblock %}
