{% extends "base.html" %}

{% block content %}
<div class="chat-wrapper d-flex flex-column" style="height: calc(100vh - 160px);">
    <div class="p-3 bg-white border-bottom d-flex align-items-center">
        <a href="/" class="text-decoration-none me-3">⬅️</a>
        <div>
            <h6 class="mb-0 fw-bold">{{ contacto.nombre }}</h6>
            <small class="text-success">● En línea</small>
        </div>
    </div>

    <div id="chat-box" class="flex-grow-1 p-3 overflow-auto" style="background-color: #f8f9fa;">
        {% for m in historial %}
            <div class="d-flex {% if m.emisor_id == session.user_id %}justify-content-end{% else %}justify-content-start{% endif %} mb-3">
                <div class="p-2 px-3 shadow-sm" 
                     style="max-width: 80%; border-radius: 15px; 
                            background-color: {% if m.emisor_id == session.user_id %}#dcf8c6{% else %}#ffffff{% endif %};">
                    <p class="mb-0">{{ m.contenido }}</p>
                    <small class="text-muted d-block text-end" style="font-size: 10px;">
                        {{ m.fecha.strftime('%H:%M') if m.fecha else '' }}
                    </small>
                </div>
            </div>
        {% endfor %}
    </div>

    <div class="p-3 bg-white border-top">
        <form id="chat-form" class="d-flex gap-2">
            <input type="text" id="mensaje-input" class="form-control" placeholder="Escribe un mensaje..." autocomplete="off">
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>
</div>

<script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
<script>
    // 1. Inicialización de la conexión
    const socket = io();
    const chatBox = document.getElementById('chat-box');
    const receptorId = {{ contacto.id }};
    const miId = {{ session.user_id }};

    // SRP: Función única para desplazar el scroll
    const scrollToBottom = () => {
        chatBox.scrollTop = chatBox.scrollHeight;
    };

    // 2. Evento de conexión (SOLID: Handshake inicial)
    socket.on('connect', () => {
        console.log("Conectado al servidor de chat");
        // Notificamos al servidor quiénes somos para unirnos a nuestra sala privada
        socket.emit('join', { user_id: miId });
    });

    // 3. Manejo del Envío (SRP: Captura y emisión)
    document.getElementById('chat-form').onsubmit = (e) => {
        e.preventDefault();
        const input = document.getElementById('mensaje-input');
        const mensajeTexto = input.value.trim();

        if (mensajeTexto) {
            socket.emit('enviar_mensaje', {
                receptor_id: receptorId,
                mensaje: mensajeTexto
            });
            input.value = '';
        }
    };

    // 4. Recepción de Mensajes (Interface Segregation: Solo procesamos datos relevantes)
    socket.on('nuevo_mensaje', (data) => {
        // Validación de contexto: Solo mostrar si pertenece a esta conversación
        const perteneceAEstaCharla = 
            (data.emisor_id == miId && data.receptor_id == receptorId) ||
            (data.emisor_id == receptorId && data.receptor_id == miId);

        if (!perteneceAEstaCharla) return;

        renderizarBurbuja(data);
        scrollToBottom();
    });

    // 5. Función de Renderizado (SRP: Responsabilidad visual únicamente)
    function renderizarBurbuja(data) {
        const esMio = data.emisor_id == miId;
        const div = document.createElement('div');
        
        div.className = `d-flex ${esMio ? 'justify-content-end' : 'justify-content-start'} mb-3`;
        
        // Estilo tipo WhatsApp con burbujas dinámicas
        div.innerHTML = `
            <div class="p-2 px-3 shadow-sm" style="
                max-width: 80%; 
                border-radius: 15px; 
                background-color: ${esMio ? '#dcf8c6' : '#ffffff'};
                border-bottom-${esMio ? 'right' : 'left'}-radius: 2px;
            ">
                <p class="mb-0">${data.mensaje}</p>
                <small class="text-muted d-block text-end" style="font-size: 10px; margin-top: 4px;">
                    ${data.fecha || 'Ahora'}
                </small>
            </div>
        `;
        
        chatBox.appendChild(div);
    }

    // Ejecución inicial
    scrollToBottom();
</script>
{% endblock %}
