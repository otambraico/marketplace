{% extends "base.html" %}

{% block title %}Únete a Barrio Market{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">Crea tu cuenta</h2>
                        <p class="text-muted">Conéctate con tu comunidad hoy mismo.</p>
                    </div>

                    <form action="/registro" method="POST">
                        <div class="mb-4 text-center">
                            <label class="form-label d-block fw-bold mb-3">¿Qué perfil buscas?</label>
                            <div class="btn-group w-100" role="group">
                                <input type="radio" class="btn-check" name="rol" id="rol_cliente" value="cliente" checked autocomplete="off">
                                <label class="btn btn-outline-primary py-3" for="rol_cliente">
                                    🙋‍♂️ Soy Vecino
                                </label>

                                <input type="radio" class="btn-check" name="rol" id="rol_mype" value="mype" autocomplete="off">
                                <label class="btn btn-outline-primary py-3" for="rol_mype">
                                    🏪 Soy Negocio
                                </label>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" name="nombre" class="form-control" id="f_nombre" placeholder="Nombre" required>
                            <label for="f_nombre">Nombre Completo</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control" id="f_email" placeholder="name@example.com" required>
                            <label for="f_email">Correo Electrónico</label>
                        </div>

                        <div id="seccion_mype" style="display: none;" class="bg-light p-3 rounded-3 mb-3 border">
                            <p class="small fw-bold text-uppercase text-secondary">Datos de tu Negocio</p>
                            <div class="form-floating mb-3">
                                <input type="text" name="nombre_comercial" class="form-control" id="f_comercial" placeholder="Nombre del local">
                                <label for="f_comercial">Nombre del Negocio</label>
                            </div>
                            <div class="mb-2">
                                <label class="small text-muted mb-1">Categoría</label>
                                <select name="categoria_id" class="form-select">
                                    {% for cat in categorias %}
                                        <option value="{{ cat.id }}">{{ cat.nombre }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="form-floating mb-4">
                            <input type="password" name="password" class="form-control" id="f_pass" placeholder="Password" required>
                            <label for="f_pass">Contraseña</label>
                            <div class="form-text">Mínimo 8 caracteres.</div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm">
                            Completar Registro
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted small">¿Ya tienes cuenta?</span> 
                        <a href="/login" class="text-decoration-none fw-bold ms-1">Inicia sesión aquí</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Lógica para mostrar/ocultar campos de MYPE
    const radioMype = document.getElementById('rol_mype');
    const radioCliente = document.getElementById('rol_cliente');
    const seccionMype = document.getElementById('seccion_mype');

    function toggleMype() {
        if (radioMype.checked) {
            seccionMype.style.display = 'block';
        } else {
            seccionMype.style.display = 'none';
        }
    }

    radioMype.addEventListener('change', toggleMype);
    radioCliente.addEventListener('change', toggleMype);
</script>
{% endblock %}
